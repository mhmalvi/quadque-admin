version: '3.7'

services:
    web:
        image: quadque-cms:latest
        ports:
            - 13000:8000
        volumes:
            - .:/app
        command: bash -c "php artisan serve --host=0.0.0.0"
        depends_on:
          - db

    db:
        image: mysql:latest
        environment:
            MYSQL_ROOT_PASSWORD: "root"
            MYSQL_DATABASE: "quadque_cms"
            MYSQL_USER: cynax
            MYSQL_PASSWORD: password
            MYSQL_PORT: 3306
        ports:
            - 13336:3306
